</head>
<body class="dark">
    <header>
            <nav class="navbar">
                <div class="logo1">
                    <img src="img/logo1.jpeg" alt="PR Logo">
                </div>
                <div class="logo2">
                    <img src="img/logo2.jpeg" alt="PR Logo">
                </div>
                <ul class="nav-left">
                    <li><a href="home.html">STORE</a></li>
                    <li><a href="library.html">LIBRARY</a></li>
                    <li><a href="friend.html">FRIENDS</a></li>
                    <li><a href="community.html">COMMUNITY</a></li>
                    <li><a href="News.html">NEWS</a></li>
                    <li><a href="profile2.html">PROFILE</a></li>
                </ul>
            </nav>
        </header>
    <div class="space"></div>
    <section id="section-wrapper">
        <div class="box-wrapper">
            <div class="info-wrapper">
                <h2 class="info-title">Contact Information</h2>
                <h3 class="info-sub-title">Fill up the form and our team will get back to you within 24 hours</h3>
                <ul class="info-details">
                    <li>
                        <i class="fas fa-phone-alt"></i>
                        <span>Phone: </span>
                        <a href="tel:01550013673">01550013673</a>
                    </li>
                    <li>
                        <i class="fas fa-paper-plane"></i>
                        <span>Email: </span>
                        <a href="projectteam299@gmail.com">PR@gmail.com</a>
                    </li>
                </ul>
            </div>
            <div class="form-wrapper">
               <form action="#" method="POST" id="contactForm">
                <h2 class="form-title">Send us a message</h2>
                <div class="form-fields">
                    <div class="form-group">
                        <input type="text" class="fname" placeholder="First Name">
                    </div>
                    <div class="form-group">
                        <input type="text" class="lname" placeholder="Last Name">
                    </div>
                    <div class="form-group">
                        <input type="email" class="email" placeholder=" Email">
                    </div>
                    <div class="form-group">
                        <input type="number" class="phone" placeholder="phone">
                    </div>
                    <div class="form-group">
                        <textarea name="message" id="textarea" placeholder="Write your message"></textarea>
                    </div>
                </div>
                <input type="submit" value="Send message" class="submit">
               </form>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-social">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/pr_gaming_store?igsh=bGd5MmtsbGYwNGlv"><i class="fab fa-instagram"></i></a>
            </div>
            <div class="footer-contact">
                <a href="contact.html"><b>Contact us</b></a>
            </div>
        </div>
    </footer>
    <script src="js/script.js"></script>
